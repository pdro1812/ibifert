name: CI IbIFerti - Test, Build e Push

on:
  push:
    branches:
      - main

jobs:
  test-backend:
    name: Rodar Testes do Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Ajusta para a tua versão v24 se necessário, mas 20 é LTS estável
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependências
        run: npm ci
        working-directory: ./backend

      - name: Rodar Testes
        run: npm test
        working-directory: ./backend

  build-and-push:
    name: Build and Push Docker Images
    needs: test-backend # ESTE PASSO É CRUCIAL: Só roda se o teste passar
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build e Push - Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ibiferti-backend:latest

      - name: Build e Push - Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ibiferti-frontend:latest