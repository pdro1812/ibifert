server {
    listen 80;
    # Substitua pelo seu domínio ou IP caso já tenha um DNS apontado
    server_name seu-dominio.com.br www.seu-dominio.com.br;

    # Rota específica para o Certbot validar o domínio
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redireciona todo o resto do tráfego HTTP para HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

